sidebar:
  left:
    sticky: true
widgets:
  - # Where should the widget be placed, left sidebar or right sidebar
    position: left
    type: profile
    # Author name
    author: Sean XU
    # Author title
    author_title: "<i>Coder</i>"
    # Author's current location
    location: Shanghai
    # URL or path to the avatar image
    avatar: # https://blogimg-1252658952.cos.ap-shanghai.myqcloud.com/avatar.png
    # Whether show the rounded avatar image
    avatar_rounded: false
    # Email address for the Gravatar
    gravatar:
    # URL or path for the follow button
    follow_link: https://github.com/astroxu
    # Links to be shown on the bottom of the profile widget
    social_links:
      Github:
        icon: fab fa-github
        url: https://github.com/astroxu
      Facebook:
        icon: fab fa-facebook
        url: https://facebook.com
      Twitter:
        icon: fab fa-twitter
        url: https://twitter.com
      Dribbble:
        icon: fab fa-dribbble
        url: https://dribbble.com
      RSS:
        icon: fas fa-rss
        url: /
  - # Where should the widget be placed, left sidebar or right sidebar
    position: left
    type: adsense
    # AdSense client ID
    client_id: ''
    # AdSense AD unit ID
    slot_id: ''
  -
    position: left
    type: toc
    index: true
    collapsed: true
    depth: 3